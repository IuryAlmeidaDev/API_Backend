spring.application.name=ProjetoApi
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
spring.jpa.open-in-view=false
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.security.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081,http://localhost:19006,http://127.0.0.1:3000,http://127.0.0.1:8081,http://127.0.0.1:19006,http://10.0.2.2:8081,http://10.0.2.2:19006,http://192.168.*:8081,http://192.168.*:19006,exp://*}
